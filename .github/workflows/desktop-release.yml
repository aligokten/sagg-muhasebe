name: Build Desktop App (Windows)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Windows installer
        run: npx electron-builder --win

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: SAGG Muhasebe Masaüstü v${{ steps.pkg.outputs.version }}
          body: Windows masaüstü uygulaması kurulum dosyası. "SAGG Muhasebe Setup ${{ steps.pkg.outputs.version }}.exe" dosyasını indirip çalıştırın.
          files: |
            release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
